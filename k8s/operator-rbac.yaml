apiVersion: v1
kind: ServiceAccount
metadata:
  name: openuba-operator
  namespace: openuba
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: openuba-operator-role
rules:
  # Framework: knowing which other operators are running (i.e. peering).
  - apiGroups: [kopf.dev]
    resources: [clusterkopfpeerings]
    verbs: [list, watch, patch, get]

  # Kopf needs to watch CRD definitions for schema changes
  - apiGroups: [apiextensions.k8s.io]
    resources: [customresourcedefinitions]
    verbs: [list, watch]

  # Watching our CRDs
  - apiGroups: [openuba.io]
    resources: [ubainferences, ubatrainings]
    verbs: [list, watch, patch, get, update]
  - apiGroups: [openuba.io]
    resources: [ubainferences/status, ubatrainings/status]
    verbs: [patch, update]
    
  # Managing Jobs and Pods
  - apiGroups: [batch, extensions]
    resources: [jobs]
    verbs: [create, delete, list, watch, get]
  - apiGroups: [""]
    resources: [pods, pods/log]
    verbs: [list, watch, get]
  # Events
  - apiGroups: [""]
    resources: [events]
    verbs: [create]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: openuba-operator-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: openuba-operator-role
subjects:
  - kind: ServiceAccount
    name: openuba-operator
    namespace: openuba
