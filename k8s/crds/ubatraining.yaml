apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: ubatrainings.openuba.io
spec:
  group: openuba.io
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                modelRef:
                  type: string
                runtime:
                  type: string
                configPath:
                  type: string
                outputPath:
                  type: string
                runId:
                  type: string
                executionId:
                  type: string
                modelSlug:
                  type: string
                modelVersion:
                  type: string
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
              properties:
                phase:
                  type: string
                message:
                  type: string
                startedAt:
                  type: string
                completedAt:
                  type: string
                metricsPath:
                  type: string
  scope: Namespaced
  names:
    plural: ubatrainings
    singular: ubatraining
    kind: UBATraining
    shortNames:
      - train
