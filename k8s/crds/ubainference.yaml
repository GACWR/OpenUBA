apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: ubainferences.openuba.io
spec:
  group: openuba.io
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                modelRef:
                  type: string
                runtime:
                  type: string
                inputPath:
                  type: string
                outputPath:
                  type: string
                runId:
                  type: string
                executionId:
                  type: string
                modelSlug:
                  type: string
                modelVersion:
                  type: string
                artifactPath:
                  type: string
                modelId:
                  type: string
                  description: "UUID of the model record in the platform database"
                datasetId:
                  type: string
                  description: "UUID of the dataset to run inference on"
                hardwareTier:
                  type: string
                  enum: [cpu-small, cpu-large, gpu-small, gpu-large]
                  default: cpu-small
                experimentId:
                  type: string
                  description: "UUID of the experiment to track this run under"
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
              properties:
                phase:
                  type: string
                message:
                  type: string
                startedAt:
                  type: string
                completedAt:
                  type: string
                resultReady:
                  type: boolean
                resultPath:
                  type: string
      additionalPrinterColumns:
        - name: Model
          type: string
          jsonPath: .spec.modelRef
        - name: Status
          type: string
          jsonPath: .status.phase
        - name: Hardware
          type: string
          jsonPath: .spec.hardwareTier
        - name: Result
          type: boolean
          jsonPath: .status.resultReady
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
  scope: Namespaced
  names:
    plural: ubainferences
    singular: ubainference
    kind: UBAInference
    shortNames:
      - inf
