apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: ubainferences.openuba.io
spec:
  group: openuba.io
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                modelRef:
                  type: string
                runtime:
                  type: string
                inputPath:
                  type: string
                outputPath:
                  type: string
                runId:
                  type: string
                executionId:
                  type: string
                modelSlug:
                  type: string
                modelVersion:
                  type: string
                artifactPath:
                  type: string
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
              properties:
                phase:
                  type: string
                message:
                  type: string
                startedAt:
                  type: string
                completedAt:
                  type: string
                resultReady:
                  type: boolean
                resultPath:
                  type: string
  scope: Namespaced
  names:
    plural: ubainferences
    singular: ubainference
    kind: UBAInference
    shortNames:
      - inf
