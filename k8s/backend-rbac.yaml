apiVersion: v1
kind: ServiceAccount
metadata:
  name: backend-sa
  namespace: openuba
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: backend-role
  namespace: openuba
rules:
- apiGroups: [""]
  resources: ["pods", "pods/log"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["openuba.io"]
  resources: ["ubainferences", "ubatrainings"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["openuba.io"]
  resources: ["ubainferences/status", "ubatrainings/status"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: backend-role-binding
  namespace: openuba
subjects:
- kind: ServiceAccount
  name: backend-sa
  namespace: openuba
roleRef:
  kind: Role
  name: backend-role
  apiGroup: rbac.authorization.k8s.io
