apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: openuba-ingress
  namespace: openuba
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: openuba.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
          - path: /graphql
            pathType: Prefix
            backend:
              service:
                name: postgraphile
                port:
                  number: 5000

